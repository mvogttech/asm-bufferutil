<!DOCTYPE html>
<html>
<head>
    <title>ASM WebSocket Test</title>
    <style>
        body { font-family: monospace; background: #1a1a2e; color: #0f0; padding: 2rem; }
        #log { background: #000; padding: 1rem; height: 300px; overflow-y: auto; border: 1px solid #333; }
        input { background: #000; color: #0f0; border: 1px solid #333; padding: 0.5rem; width: 300px; }
        button { background: #333; color: #0f0; border: 1px solid #0f0; padding: 0.5rem 1rem; cursor: pointer; }
        .entry { margin: 2px 0; }
        .sent { color: #0ff; }
        .recv { color: #0f0; }
        .sys { color: #ff0; }
    </style>
</head>
<body>
    <h2>x86-64 Assembly WebSocket Server Test</h2>
    <div id="log"></div>
    <br>
    <input id="msg" placeholder="Type a message..." onkeydown="if(event.key==='Enter')send()">
    <button onclick="send()">Send</button>
    <button onclick="connect()">Connect</button>
    <button onclick="ws&&ws.close()">Disconnect</button>
    <script>
        let ws;
        const log = document.getElementById('log');
        const msg = document.getElementById('msg');
        
        function addLog(text, cls) {
            const d = document.createElement('div');
            d.className = 'entry ' + cls;
            d.textContent = text;
            log.appendChild(d);
            log.scrollTop = log.scrollHeight;
        }

        function connect() {
            ws = new WebSocket('ws://localhost:9001');
            ws.onopen = () => addLog('[connected]', 'sys');
            ws.onclose = () => addLog('[disconnected]', 'sys');
            ws.onerror = (e) => addLog('[error] ' + e.type, 'sys');
            ws.onmessage = (e) => addLog('← ' + e.data, 'recv');
        }

        function send() {
            if (ws && ws.readyState === 1) {
                addLog('→ ' + msg.value, 'sent');
                ws.send(msg.value);
                msg.value = '';
            }
        }

        connect();
    </script>
</body>
</html>
